// ─── GANTT CHART (Personnel) ───
// By Personnel: Personnel → Installation → Scope
function buildHierarchyByPersonnel(techMap, techNames) {
  const rows = [];
  techNames.forEach((techName, ti) => {
    const tasks = techMap[techName];
    const byInstall = {};
    tasks.forEach(t => {
      const inst = (t.install || '').trim() || '(No installation)';
      const sc = (t.scope || '').trim() || '(No scope)';
      if (!byInstall[inst]) byInstall[inst] = {};
      if (!byInstall[inst][sc]) byInstall[inst][sc] = [];
      byInstall[inst][sc].push(t);
    });
    rows.push({ kind: 'tech', ti, techName, tasks });
    const installs = Object.keys(byInstall).sort();
    installs.forEach((inst, ii) => {
      const projKey = ti + '-' + ii;
      const projTasks = Object.values(byInstall[inst]).flat();
      rows.push({ kind: 'project', ti, projKey, client: inst, tasks: projTasks });
      const scopes = Object.keys(byInstall[inst]).sort();
      scopes.forEach(scope => {
        rows.push({ kind: 'scope', ti, projKey, scope, tasks: byInstall[inst][scope] });
      });
    });
  });
  return rows;
}
// By Installation: Installation → Scope → Personnel
function buildHierarchyByInstallation(techMap, techNames) {
  const tree = {};
  techNames.forEach(techName => {
    techMap[techName].forEach(t => {
      const inst = (t.install || '').trim() || '(No installation)';
      const sc = (t.scope || '').trim() || '(No scope)';
      if (!tree[inst]) tree[inst] = {};
      if (!tree[inst][sc]) tree[inst][sc] = {};
      if (!tree[inst][sc][techName]) tree[inst][sc][techName] = [];
      tree[inst][sc][techName].push(t);
    });
  });
  const rows = [];
  Object.keys(tree).sort().forEach((inst, ii) => {
    const allTasks = [];
    Object.values(tree[inst]).forEach(scopes => Object.values(scopes).forEach(tasks => allTasks.push(...tasks)));
    rows.push({ kind: 'tech', ti: ii, techName: inst, tasks: allTasks });
    Object.keys(tree[inst]).sort().forEach((scope, si) => {
      const projKey = ii + '-' + si;
      const scopeTasks = Object.values(tree[inst][scope]).flat();
      rows.push({ kind: 'project', ti: ii, projKey, client: scope, tasks: scopeTasks });
      Object.keys(tree[inst][scope]).sort().forEach(tech => {
        rows.push({ kind: 'scope', ti: ii, projKey, scope: tech, tasks: tree[inst][scope][tech] });
      });
    });
  });
  return rows;
}
// By Scope: Scope → Personnel
function buildHierarchyByScope(techMap, techNames) {
  const tree = {};
  techNames.forEach(techName => {
    techMap[techName].forEach(t => {
      const sc = (t.scope || '').trim() || '(No scope)';
      if (!tree[sc]) tree[sc] = {};
      if (!tree[sc][techName]) tree[sc][techName] = [];
      tree[sc][techName].push(t);
    });
  });
  const rows = [];
  Object.keys(tree).sort().forEach((scope, si) => {
    const allTasks = Object.values(tree[scope]).flat();
    rows.push({ kind: 'tech', ti: si, techName: scope, tasks: allTasks });
    Object.keys(tree[scope]).sort().forEach(tech => {
      rows.push({ kind: 'project', ti: si, projKey: si + '-0', client: tech, tasks: tree[scope][tech] });
    });
  });
  return rows;
}

function renderPersonnelGanttRowBars(rowEl, opts) {
  const { labelName, tasks, minDate, totalDays, dayMs, dayWidth, clientColors, showAvailable } = opts;
  if (showAvailable) {
    const covered = new Array(totalDays).fill(false);
    tasks.forEach(t => {
      let a = Math.floor((t.start - minDate) / dayMs);
      let b = Math.ceil((t.end - minDate) / dayMs);
      if (!Number.isFinite(a)) a = 0;
      if (!Number.isFinite(b) || b <= a) b = a + 1;
      for (let i = Math.max(0, a); i < Math.min(totalDays, b); i++) covered[i] = true;
    });
    for (let i = 0; i < totalDays; i++) {
      if (covered[i]) continue;
      let j = i;
      while (j < totalDays && !covered[j]) j++;
      const av = document.createElement('div');
      av.className = 'gantt-bar gantt-bar-available';
      av.style.left = (i * dayWidth) + 'px';
      av.style.width = Math.max(dayWidth, (j - i) * dayWidth) + 'px';
      av.style.background = getStatusColor('Available');
      av.style.color = '#0b1220';
      av.textContent = 'Available';
      av.title = labelName + '\nAvailable\n' + new Date(minDate.getTime() + i * dayMs).toLocaleDateString('en-GB') + ' → ' + new Date(minDate.getTime() + (j - 1) * dayMs).toLocaleDateString('en-GB');
      av.setAttribute('role', 'img');
      av.setAttribute('aria-label', labelName + ': Available from ' + new Date(minDate.getTime() + i * dayMs).toLocaleDateString('en-GB') + ' to ' + new Date(minDate.getTime() + (j - 1) * dayMs).toLocaleDateString('en-GB'));
      rowEl.appendChild(av);
      i = j - 1;
    }
  }
  tasks.forEach(t => {
    const startOff = Math.max(0, (t.start - minDate) / dayMs);
    const dur = Math.max(1, (t.end - t.start) / dayMs);
    const bar = document.createElement('div');
    bar.className = 'gantt-bar gantt-bar-assignment';
    bar.style.left = (startOff * dayWidth) + 'px';
    bar.style.width = (dur * dayWidth) + 'px';
    bar.style.background = getStatusColor(t.status);
    const clientPart = (t.client || t.install || '').trim();
    const scopePart = (t.scope || '').trim();
    bar.textContent = scopePart ? (clientPart ? clientPart + ' - ' + scopePart : scopePart) : (clientPart || t.install);
    bar.title = labelName + '\n' + (clientPart || '(no client)') + (scopePart ? '\nScope: ' + scopePart : '') + '\n' + t.install + '\n' + t.start.toLocaleDateString('en-GB') + ' → ' + t.end.toLocaleDateString('en-GB') + '\n' + t.status;
    bar.setAttribute('role', 'img');
    bar.setAttribute('aria-label', labelName + ': ' + bar.textContent + ', ' + t.start.toLocaleDateString('en-GB') + ' to ' + t.end.toLocaleDateString('en-GB'));
    rowEl.appendChild(bar);
  });
}

function renderGantt(data) {
  const container = document.getElementById('personnel-gantt-view');
  container.innerHTML = '';

  const techMap = {};
  data.forEach(r => {
    const name = (r['Technician Name'] || '').toString().trim();
    if (!name) return;
    const s = excelDate(r['Start Date']), e = excelDate(r['End Date']);
    if (!s || !e) return;
    if (!techMap[name]) techMap[name] = [];
    techMap[name].push({
      start: s, end: e,
      client: (r['Client'] || '').toString().trim(),
      scope: (r['Scope'] || r['scope'] || '').toString().trim(),
      install: (r['Installation'] || '').toString().trim(),
      status: (r['Status'] || '').toString().trim()
    });
  });

  const techNames = Object.keys(techMap).sort();
  if (techNames.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="4" rx="1"/><rect x="3" y="10" width="12" height="4" rx="1"/><rect x="3" y="16" width="15" height="4" rx="1"/></svg></div><div class="empty-title">No Gantt Data</div><div class="empty-desc">No valid date ranges found in filtered data.</div></div>';
    return;
  }

  const hierarchyRows = personnelGanttHierarchy === 'installation'
    ? buildHierarchyByInstallation(techMap, techNames)
    : personnelGanttHierarchy === 'scope'
    ? buildHierarchyByScope(techMap, techNames)
    : buildHierarchyByPersonnel(techMap, techNames);

  let minDate = new Date(9999, 0, 1), maxDate = new Date(0);
  Object.values(techMap).forEach(tasks => tasks.forEach(t => {
    if (t.start < minDate) minDate = new Date(t.start);
    if (t.end > maxDate) maxDate = new Date(t.end);
  }));

  const allClients = [...new Set(Object.values(techMap).flat().map(t => t.client))].filter(Boolean);
  const clientColors = {};
  allClients.forEach((c, i) => { clientColors[c] = COLORS[i % COLORS.length]; });

  const dayMs = 864e5;
  const ganttScale = personnelGanttScale || 'month';
  let dayWidth = 18;
  if (ganttScale === 'week') dayWidth = 22;
  else if (ganttScale === 'day') dayWidth = 26;
  const rowH = 32;
  const totalDays = Math.ceil((maxDate - minDate) / dayMs) + 2;
  const dataRowCount = hierarchyRows.length;

  const expandedTech = {};
  const expandedProj = {};
  hierarchyRows.forEach(r => { if (r.kind === 'tech') expandedTech[r.ti] = true; });
  hierarchyRows.forEach(r => { if (r.kind === 'project') expandedProj[r.projKey] = true; });

  const wrap = document.createElement('div');
  wrap.className = 'gantt-wrap';

  function applyGanttHierarchyVisibility() {
    wrap.querySelectorAll('[data-gantt-t]').forEach(el => {
      const ti = el.dataset.ganttT;
      const pk = el.dataset.ganttProj;
      let hide = expandedTech[ti] === false;
      if (!hide && pk !== undefined && pk !== '') hide = expandedProj[pk] === false;
      el.classList.toggle('gantt-collapsed-row', hide);
    });
    wrap.querySelectorAll('.gantt-toggle[data-gantt-tech-toggle]').forEach(btn => {
      const ti = btn.dataset.ganttTechToggle;
      btn.textContent = expandedTech[ti] ? '▼' : '▶';
      btn.setAttribute('aria-expanded', expandedTech[ti] ? 'true' : 'false');
    });
    wrap.querySelectorAll('.gantt-toggle[data-gantt-proj-toggle]').forEach(btn => {
      const pk = btn.dataset.ganttProjToggle;
      btn.textContent = expandedProj[pk] ? '▼' : '▶';
      btn.setAttribute('aria-expanded', expandedProj[pk] ? 'true' : 'false');
    });
  }

  const toolbar = document.createElement('div');
  toolbar.className = 'gantt-toolbar';
  const toolbarLeft = document.createElement('div');
  toolbarLeft.style.display = 'flex';
  toolbarLeft.style.alignItems = 'center';
  toolbarLeft.style.gap = '12px';
  toolbarLeft.style.flexWrap = 'wrap';

  const rangeEl = document.createElement('div');
  rangeEl.className = 'gantt-range';
  rangeEl.textContent = minDate.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) + ' — ' + maxDate.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });

  const scaleEl = document.createElement('div');
  scaleEl.className = 'gantt-scale';
  scaleEl.setAttribute('role', 'group');
  scaleEl.setAttribute('aria-label', 'Gantt scale');

  const makeScaleBtn = (key, label) => {
    const b = document.createElement('button');
    b.className = 'gantt-scale-btn' + (ganttScale === key ? ' active' : '');
    b.textContent = label;
    b.setAttribute('type', 'button');
    b.addEventListener('click', () => setPersonnelGanttScale(key));
    return b;
  };

  scaleEl.appendChild(makeScaleBtn('month', 'Month'));
  scaleEl.appendChild(makeScaleBtn('week', 'Week'));
  scaleEl.appendChild(makeScaleBtn('day', 'Day'));

  const hierEl = document.createElement('div');
  hierEl.className = 'gantt-scale';
  hierEl.setAttribute('role', 'group');
  hierEl.setAttribute('aria-label', 'Gantt hierarchy');
  const makeHierBtn = (key, label) => {
    const b = document.createElement('button');
    b.className = 'gantt-scale-btn' + (personnelGanttHierarchy === key ? ' active' : '');
    b.textContent = label;
    b.setAttribute('type', 'button');
    b.addEventListener('click', () => setPersonnelGanttHierarchy(key));
    return b;
  };
  hierEl.appendChild(makeHierBtn('personnel', 'By Personnel'));
  hierEl.appendChild(makeHierBtn('installation', 'By Installation'));
  hierEl.appendChild(makeHierBtn('scope', 'By Scope'));

  toolbarLeft.appendChild(rangeEl);
  toolbarLeft.appendChild(scaleEl);
  toolbarLeft.appendChild(hierEl);

  const statsEl = document.createElement('div');
  statsEl.style.fontSize = '11px';
  statsEl.style.color = 'var(--text-2)';
  statsEl.textContent = techNames.length + ' technicians • ' + data.length + ' assignments';

  toolbar.appendChild(toolbarLeft);
  toolbar.appendChild(statsEl);
  wrap.appendChild(toolbar);

  const gc = document.createElement('div');
  gc.className = 'gantt-container';

  const names = document.createElement('div');
  names.className = 'gantt-names';
  const nh = document.createElement('div');
  nh.className = 'gantt-name-row';
  nh.style.fontWeight = '700';
  nh.style.fontSize = '10px';
  nh.style.color = 'var(--text-3)';
  nh.style.textTransform = 'uppercase';
  nh.style.background = 'var(--bg)';
  const hierLabels = { personnel: 'Personnel / Installation / Scope', installation: 'Installation / Scope / Personnel', scope: 'Scope / Personnel' };
  const hierLabel = hierLabels[personnelGanttHierarchy] || hierLabels.personnel;
  nh.innerHTML = '<span class="gantt-toggle-spacer"></span><span class="gantt-name-label">' + hierLabel + '</span>';
  names.appendChild(nh);

  const grid = document.createElement('div');
  grid.className = 'gantt-grid';
  const inner = document.createElement('div');
  inner.className = 'gantt-grid-inner';
  inner.style.width = (totalDays * dayWidth) + 'px';

  const header = document.createElement('div');
  header.className = 'gantt-header';
  let headerWrap = null;
  function isoWeekInfo(d) {
    // ISO week based on Thursday-in-week rule
    const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
    const dayNum = date.getUTCDay() || 7; // Mon=1..Sun=7
    date.setUTCDate(date.getUTCDate() + 4 - dayNum); // shift to Thursday
    const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
    const weekNum = Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
    return { year: date.getUTCFullYear(), week: weekNum };
  }

  if (ganttScale === 'day') {
    headerWrap = document.createElement('div');
    headerWrap.className = 'gantt-header-wrap';

    // Row 1: months spanning across the visible days
    const monthRow = document.createElement('div');
    monthRow.className = 'gantt-header-row';
    let curMonth = '';
    let monthStart = 0;
    for (let i = 0; i <= totalDays; i++) {
      const dt = new Date(minDate.getTime() + i * dayMs);
      const mo = i < totalDays ? dt.toLocaleDateString('en-GB', { month: 'short', year: 'numeric' }) : curMonth;
      if (mo !== curMonth) {
        if (curMonth && i > monthStart) {
          const cell = document.createElement('div');
          cell.className = 'gantt-header-cell';
          cell.style.width = ((i - monthStart) * dayWidth) + 'px';
          cell.textContent = curMonth;
          monthRow.appendChild(cell);
        }
        curMonth = mo;
        monthStart = i;
      }
    }
    if (curMonth && totalDays > monthStart) {
      const cell = document.createElement('div');
      cell.className = 'gantt-header-cell';
      cell.style.width = ((totalDays - monthStart) * dayWidth) + 'px';
      cell.textContent = curMonth;
      monthRow.appendChild(cell);
    }

    // Row 2: day numbers
    const dayRow = document.createElement('div');
    dayRow.className = 'gantt-header-row';
    for (let i = 0; i < totalDays; i++) {
      const dt = new Date(minDate.getTime() + i * dayMs);
      const cell = document.createElement('div');
      cell.className = 'gantt-header-cell';
      cell.style.width = dayWidth + 'px';
      cell.textContent = String(dt.getDate());
      dayRow.appendChild(cell);
    }

    headerWrap.appendChild(monthRow);
    headerWrap.appendChild(dayRow);
  } else if (ganttScale === 'week') {
    let curKey = '';
    let curLabel = '';
    let cellStart = 0;
    for (let i = 0; i <= totalDays; i++) {
      const dt = new Date(minDate.getTime() + i * dayMs);
      const w = isoWeekInfo(dt);
      const key = w.year + '-' + w.week;
      const label = 'W' + w.week;
      if (key !== curKey) {
        if (curKey && i > cellStart) {
          const cell = document.createElement('div');
          cell.className = 'gantt-header-cell';
          cell.style.width = ((i - cellStart) * dayWidth) + 'px';
          cell.textContent = curLabel;
          header.appendChild(cell);
        }
        curKey = key;
        curLabel = label;
        cellStart = i;
      }
    }
    if (totalDays > cellStart) {
      const cell = document.createElement('div');
      cell.className = 'gantt-header-cell';
      cell.style.width = ((totalDays - cellStart) * dayWidth) + 'px';
      cell.textContent = curLabel;
      header.appendChild(cell);
    }
  } else {
    let curMonth = '';
    let monthStart = 0;
    for (let i = 0; i <= totalDays; i++) {
      const dt = new Date(minDate.getTime() + i * dayMs);
      const mo = dt.toLocaleDateString('en-GB', { month: 'short', year: 'numeric' });
      if (mo !== curMonth) {
        if (curMonth && i > monthStart) {
          const cell = document.createElement('div');
          cell.className = 'gantt-header-cell';
          cell.style.width = ((i - monthStart) * dayWidth) + 'px';
          cell.textContent = curMonth;
          header.appendChild(cell);
        }
        curMonth = mo;
        monthStart = i;
      }
    }
    if (totalDays > monthStart) {
      const cell = document.createElement('div');
      cell.className = 'gantt-header-cell';
      cell.style.width = ((totalDays - monthStart) * dayWidth) + 'px';
      cell.textContent = curMonth;
      header.appendChild(cell);
    }
  }
  if (headerWrap) inner.appendChild(headerWrap);
  else inner.appendChild(header);

  // Align left-side header row height with the timeline header height.
  requestAnimationFrame(() => {
    const hh = headerWrap ? headerWrap.offsetHeight : header.offsetHeight;
    nh.style.height = hh + 'px';
    nh.style.minHeight = hh + 'px';
  });

  // When the header changes height (e.g. Day mode has 2 rows), align the left-side
  // header height so technician rows start at the same vertical offset as bars.
  requestAnimationFrame(() => {
    const hh = (headerWrap ? headerWrap.offsetHeight : header.offsetHeight) || rowH;
    nh.style.height = hh + 'px';
    nh.style.minHeight = hh + 'px';
  });

  hierarchyRows.forEach(spec => {
    const nameRow = document.createElement('div');
    const gridRow = document.createElement('div');
    gridRow.className = 'gantt-row';

    if (spec.kind === 'tech') {
      nameRow.className = 'gantt-name-row gantt-h-tech';
      const hasChildren = hierarchyRows.some(r => r.kind !== 'tech' && r.ti === spec.ti);
      if (hasChildren) {
        const toggle = document.createElement('span');
        toggle.className = 'gantt-toggle';
        toggle.textContent = '▼';
        toggle.setAttribute('role', 'button');
        toggle.setAttribute('aria-label', 'Expand or collapse ' + spec.techName);
        toggle.setAttribute('aria-expanded', 'true');
        toggle.dataset.ganttTechToggle = String(spec.ti);
        toggle.addEventListener('click', e => {
          e.stopPropagation();
          expandedTech[spec.ti] = !expandedTech[spec.ti];
          applyGanttHierarchyVisibility();
        });
        nameRow.appendChild(toggle);
      } else {
        nameRow.appendChild(document.createElement('span')).className = 'gantt-toggle-spacer';
      }
      const lab = document.createElement('span');
      lab.className = 'gantt-name-label';
      lab.textContent = spec.techName;
      lab.title = spec.techName;
      nameRow.appendChild(lab);
      renderPersonnelGanttRowBars(gridRow, {
        labelName: spec.techName,
        tasks: spec.tasks,
        minDate, totalDays, dayMs, dayWidth, clientColors,
        showAvailable: personnelGanttHierarchy === 'personnel'
      });
    } else if (spec.kind === 'project') {
      nameRow.className = 'gantt-name-row gantt-h-project';
      nameRow.dataset.ganttT = String(spec.ti);
      gridRow.dataset.ganttT = String(spec.ti);
      const hasChildren = hierarchyRows.some(r => r.kind === 'scope' && r.projKey === spec.projKey);
      if (hasChildren) {
        const toggle = document.createElement('span');
        toggle.className = 'gantt-toggle';
        toggle.textContent = '▼';
        toggle.setAttribute('role', 'button');
        toggle.setAttribute('aria-label', 'Expand or collapse ' + spec.client);
        toggle.setAttribute('aria-expanded', 'true');
        toggle.dataset.ganttProjToggle = spec.projKey;
        toggle.addEventListener('click', e => {
          e.stopPropagation();
          expandedProj[spec.projKey] = !expandedProj[spec.projKey];
          applyGanttHierarchyVisibility();
        });
        nameRow.appendChild(toggle);
      } else {
        nameRow.appendChild(document.createElement('span')).className = 'gantt-toggle-spacer';
      }
      const lab = document.createElement('span');
      lab.className = 'gantt-name-label';
      lab.textContent = spec.client;
      lab.title = spec.client;
      nameRow.appendChild(lab);
      renderPersonnelGanttRowBars(gridRow, {
        labelName: spec.techName + ' / ' + spec.client,
        tasks: spec.tasks,
        minDate, totalDays, dayMs, dayWidth, clientColors,
        showAvailable: false
      });
    } else if (spec.kind === 'scope') {
      nameRow.className = 'gantt-name-row gantt-h-scope';
      nameRow.dataset.ganttT = String(spec.ti);
      nameRow.dataset.ganttProj = spec.projKey;
      gridRow.dataset.ganttT = String(spec.ti);
      gridRow.dataset.ganttProj = spec.projKey;
      nameRow.appendChild(document.createElement('span')).className = 'gantt-toggle-spacer';
      const lab = document.createElement('span');
      lab.className = 'gantt-name-label';
      lab.textContent = spec.scope;
      lab.title = spec.scope;
      nameRow.appendChild(lab);
      renderPersonnelGanttRowBars(gridRow, {
        labelName: spec.techName + ' / ' + spec.scope,
        tasks: spec.tasks,
        minDate, totalDays, dayMs, dayWidth, clientColors,
        showAvailable: false
      });
    }

    names.appendChild(nameRow);
    inner.appendChild(gridRow);
  });

  const today = new Date();
  if (today >= minDate && today <= maxDate) {
    const todayOff = (today - minDate) / dayMs;
    const todayLine = document.createElement('div');
    todayLine.className = 'gantt-today';
    todayLine.style.left = (todayOff * dayWidth) + 'px';
    requestAnimationFrame(() => {
      const hh = (headerWrap ? headerWrap.offsetHeight : header.offsetHeight) || rowH;
      todayLine.style.top = hh + 'px';
      todayLine.style.height = (dataRowCount * rowH) + 'px';
    });
    inner.appendChild(todayLine);
  }

  grid.appendChild(inner);
  gc.appendChild(names);
  gc.appendChild(grid);
  wrap.appendChild(gc);

  applyGanttHierarchyVisibility();

  names.addEventListener('scroll', () => { grid.scrollTop = names.scrollTop; });
  grid.addEventListener('scroll', () => { names.scrollTop = grid.scrollTop; });

  const legend = document.createElement('div');
  legend.className = 'gantt-legend';
  STATUS_ORDER.forEach(st => {
    const item = document.createElement('div');
    item.className = 'gantt-legend-item';
    item.innerHTML = '<div class="gantt-legend-dot" style="background:' + STATUS_COLORS[st] + ';border:1px solid rgba(0,0,0,0.12)"></div>' + esc(st);
    legend.appendChild(item);
  });
  // Put legend above gantt diagram (between toolbar and gantt-container).
  wrap.insertBefore(legend, gc);

  container.appendChild(wrap);
}

function renderEquipment() {
  const d = state.equipment.filtered;
  const total = d.length;
  const uniqueEquip = new Set(d.map(r => (r['Equipment Name'] || '').toString().trim())).size;
  const expired = d.filter(r => getCalibStatus(r['Calibration End Date']) === 'expired').length;
  const critical = d.filter(r => getCalibStatus(r['Calibration End Date']) === 'critical').length;
  const warning = d.filter(r => getCalibStatus(r['Calibration End Date']) === 'warning').length;
  const valid = d.filter(r => getCalibStatus(r['Calibration End Date']) === 'ok').length;
  const complianceRate = total > 0 ? ((valid + warning) / total * 100) : 0;

  renderKPIs('kpi-equipment', [
    { label: 'Total Equipment', value: total, format: 'int', sub: uniqueEquip + ' unique types', accent: 'var(--brand)' },
    { label: 'Calibration Valid', value: valid, format: 'int', sub: 'More than 3 months', accent: 'var(--success)' },
    { label: 'Expiring Soon', value: warning + critical, format: 'int', sub: critical + ' this month, ' + warning + ' next 3mo', accent: critical > 0 ? 'var(--danger)' : 'var(--warning)' },
    { label: 'Expired', value: expired, format: 'int', sub: 'Requires recalibration', accent: 'var(--danger)' },
    { label: 'Compliance Rate', value: complianceRate, format: 'pct', sub: 'Valid + Warning', accent: complianceRate >= 80 ? 'var(--success)' : 'var(--danger)' }
  ]);

  if (equipmentView === 'gantt') {
    renderEquipmentGantt(d);
    document.getElementById('charts-equipment').style.display = 'none';
    document.getElementById('equipment-table-view').style.display = 'none';
    document.getElementById('equipment-gantt-view').style.display = '';
    const summary = document.getElementById('equipment-summary-view');
    if (summary) {
      summary.style.display = '';
      renderEquipmentSummaryTable(d);
    }
  } else if (equipmentView === 'table') {
    document.getElementById('equipment-gantt-view').innerHTML = '';
    document.getElementById('charts-equipment').style.display = 'none';
    document.getElementById('equipment-table-view').style.display = '';
    const summary = document.getElementById('equipment-summary-view');
    if (summary) summary.style.display = 'none';
    renderEquipmentTable(d);
  } else {
    document.getElementById('equipment-gantt-view').innerHTML = '';
    document.getElementById('equipment-table-view').style.display = 'none';
    document.getElementById('charts-equipment').style.display = '';
    const summary = document.getElementById('equipment-summary-view');
    if (summary) summary.style.display = 'none';
    renderEquipmentCharts(d);
  }
}

}

function setEquipmentGanttScale(scale) {
  equipmentGanttScale = scale;
  if (equipmentView === 'gantt') renderEquipment();
}
function setEquipmentGanttHierarchy(mode) {
  equipmentGanttHierarchy = mode;
  if (equipmentView === 'gantt') renderEquipment();
}

function buildEquipmentGanttHierarchy(equipMap, equipNames) {
  const tree = {};
  equipNames.forEach(name => {
    equipMap[name].forEach(t => {
      const client = (t.client || '').trim() || '(No client)';
      const install = (t.install || '').trim() || '(No installation)';
      if (!tree[client]) tree[client] = {};
      if (!tree[client][install]) tree[client][install] = {};
      if (!tree[client][install][name]) tree[client][install][name] = [];
      tree[client][install][name].push(t);
    });
  });
  const rows = [];
  const clients = Object.keys(tree).sort();
  clients.forEach((client, ci) => {
    const allClientTasks = [];
    Object.values(tree[client]).forEach(installs => Object.values(installs).forEach(tasks => allClientTasks.push(...tasks)));
    rows.push({ kind: 'tech', ti: ci, techName: client, tasks: allClientTasks });
    const installs = Object.keys(tree[client]).sort();
    installs.forEach((install, ii) => {
      const projKey = ci + '-' + ii;
      const allInstTasks = [];
      Object.values(tree[client][install]).forEach(tasks => allInstTasks.push(...tasks));
      rows.push({ kind: 'project', ti: ci, projKey, techName: client, client: install, tasks: allInstTasks });
      const equips = Object.keys(tree[client][install]).sort();
      equips.forEach(eq => {
        rows.push({ kind: 'scope', ti: ci, projKey, techName: eq, client: install, scope: eq, tasks: tree[client][install][eq] });
      });
    });
  });
  return rows;
}

function renderEquipmentGantt(data) {
  const container = document.getElementById('equipment-gantt-view');
  container.innerHTML = '';
  const equipMap = {};
  data.forEach(r => {
    const eName = (r['Equipment Name'] || '').toString().trim();
    const eId = (r['Equipment ID'] || '').toString().trim();
    const name = eId && eId !== eName ? eName + ' (' + eId + ')' : eName;
    if (!name) return;
    const s = excelDate(r['Start Date']), e = excelDate(r['End Date']), ce = excelDate(r['Calibration End Date']);
    if (!s || !e) return;
    if (!equipMap[name]) equipMap[name] = [];
    equipMap[name].push({ start: s, end: e, calibEnd: ce, client: (r['Client'] || '').toString().trim(), install: (r['Installation'] || '').toString().trim(), status: (r['Status'] || '').toString().trim(), calibStatus: getCalibStatus(r['Calibration End Date']), category: (r['Category'] || '').toString().trim() });
  });
  const equipNames = Object.keys(equipMap).sort();
  if (equipNames.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg></div><div class="empty-title">No Equipment Data</div><div class="empty-desc">No valid date ranges found in filtered data.</div></div>';
    return;
  }
  const useHierarchy = equipmentGanttHierarchy === 'client';
  const hierarchyRows = useHierarchy ? buildEquipmentGanttHierarchy(equipMap, equipNames) : null;

  let minDate = new Date(9999, 0, 1), maxDate = new Date(0);
  Object.values(equipMap).forEach(tasks => tasks.forEach(t => {
    if (t.start < minDate) minDate = new Date(t.start);
    const furthest = t.calibEnd && t.calibEnd > t.end ? t.calibEnd : t.end;
    if (furthest > maxDate) maxDate = new Date(furthest);
  }));
  const calibColorMap = { ok: '#7AB800', warning: '#eab308', critical: '#E98300', expired: '#C82882', unknown: '#A6BCC6' };
  const dayMs = 864e5, rowH = 32;
  const ganttScale = equipmentGanttScale || 'month';
  let dayWidth = 18;
  if (ganttScale === 'week') dayWidth = 22;
  if (ganttScale === 'day') dayWidth = 26;
  const totalDays = Math.ceil((maxDate - minDate) / dayMs) + 2;
  const dataRowCount = useHierarchy ? hierarchyRows.length : equipNames.length;

  const expandedTech = {};
  const expandedProj = {};
  if (useHierarchy) {
    hierarchyRows.forEach(r => { if (r.kind === 'tech') expandedTech[r.ti] = true; });
    hierarchyRows.forEach(r => { if (r.kind === 'project') expandedProj[r.projKey] = true; });
  }

  const wrap = document.createElement('div');
  wrap.className = 'gantt-wrap';

  function applyEqHierarchyVisibility() {
    wrap.querySelectorAll('[data-gantt-t]').forEach(el => {
      const ti = el.dataset.ganttT;
      const pk = el.dataset.ganttProj;
      let hide = expandedTech[ti] === false;
      if (!hide && pk !== undefined && pk !== '') hide = expandedProj[pk] === false;
      el.classList.toggle('gantt-collapsed-row', hide);
    });
    wrap.querySelectorAll('.gantt-toggle[data-gantt-tech-toggle]').forEach(btn => {
      btn.textContent = expandedTech[btn.dataset.ganttTechToggle] ? '▼' : '▶';
    });
    wrap.querySelectorAll('.gantt-toggle[data-gantt-proj-toggle]').forEach(btn => {
      btn.textContent = expandedProj[btn.dataset.ganttProjToggle] ? '▼' : '▶';
    });
  }

  const toolbar = document.createElement('div');
  toolbar.className = 'gantt-toolbar';
  const expCount = data.filter(r => { const s = getCalibStatus(r['Calibration End Date']); return s === 'critical' || s === 'expired'; }).length;
  const toolbarLeft = document.createElement('div');
  toolbarLeft.style.display = 'flex';
  toolbarLeft.style.alignItems = 'center';
  toolbarLeft.style.gap = '12px';
  toolbarLeft.style.flexWrap = 'wrap';
  const rangeEl = document.createElement('div');
  rangeEl.className = 'gantt-range';
  rangeEl.textContent = minDate.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) + ' — ' + maxDate.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });

  const scaleEl = document.createElement('div');
  scaleEl.className = 'gantt-scale';
  scaleEl.setAttribute('role', 'group');
  scaleEl.setAttribute('aria-label', 'Gantt scale');
  const makeScaleBtn = (key, label) => {
    const b = document.createElement('button');
    b.className = 'gantt-scale-btn' + (ganttScale === key ? ' active' : '');
    b.textContent = label;
    b.setAttribute('type', 'button');
    b.addEventListener('click', () => setEquipmentGanttScale(key));
    return b;
  };
  scaleEl.appendChild(makeScaleBtn('month', 'Month'));
  scaleEl.appendChild(makeScaleBtn('week', 'Week'));
  scaleEl.appendChild(makeScaleBtn('day', 'Day'));

  const hierEl = document.createElement('div');
  hierEl.className = 'gantt-scale';
  hierEl.setAttribute('role', 'group');
  hierEl.setAttribute('aria-label', 'Gantt hierarchy');
  const makeHierBtn = (key, label) => {
    const b = document.createElement('button');
    b.className = 'gantt-scale-btn' + (equipmentGanttHierarchy === key ? ' active' : '');
    b.textContent = label;
    b.setAttribute('type', 'button');
    b.addEventListener('click', () => setEquipmentGanttHierarchy(key));
    return b;
  };
  hierEl.appendChild(makeHierBtn('flat', 'By Equipment'));
  hierEl.appendChild(makeHierBtn('client', 'By Client'));

  toolbarLeft.appendChild(rangeEl);
  toolbarLeft.appendChild(scaleEl);
  toolbarLeft.appendChild(hierEl);

  const statsEl = document.createElement('div');
  statsEl.style.display = 'flex';
  statsEl.style.alignItems = 'center';
  statsEl.style.gap = '14px';
  statsEl.style.fontSize = '11px';
  statsEl.style.color = 'var(--text-2)';
  statsEl.textContent = equipNames.length + ' equipment';
  if (expCount > 0) {
    const span = document.createElement('span');
    span.style.color = 'var(--danger)';
    span.style.fontWeight = '700';
    span.textContent = expCount + ' calibration alerts';
    statsEl.appendChild(document.createTextNode(' • '));
    statsEl.appendChild(span);
  }

  toolbar.appendChild(toolbarLeft);
  toolbar.appendChild(statsEl);
  wrap.appendChild(toolbar);
  const gc = document.createElement('div');
  gc.className = 'gantt-container';
  const names = document.createElement('div');
  names.className = 'gantt-names';
  names.style.width = useHierarchy ? '280px' : '220px';
  const nh = document.createElement('div');
  nh.className = 'gantt-name-row';
  nh.style.fontWeight = '700'; nh.style.fontSize = '10px'; nh.style.color = 'var(--text-3)'; nh.style.textTransform = 'uppercase';
  nh.textContent = useHierarchy ? 'Client / Installation / Equipment' : 'Equipment';
  names.appendChild(nh);

  const grid = document.createElement('div');
  grid.className = 'gantt-grid';
  const inner = document.createElement('div');
  inner.className = 'gantt-grid-inner';
  inner.style.width = (totalDays * dayWidth) + 'px';
  const header = document.createElement('div');
  header.className = 'gantt-header';
  let headerWrap = null;
  function isoWeekInfo(d) {
    const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
    const dayNum = date.getUTCDay() || 7;
    date.setUTCDate(date.getUTCDate() + 4 - dayNum);
    const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
    const weekNum = Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
    return { year: date.getUTCFullYear(), week: weekNum };
  }

  if (ganttScale === 'day') {
    headerWrap = document.createElement('div');
    headerWrap.className = 'gantt-header-wrap';
    const monthRow = document.createElement('div');
    monthRow.className = 'gantt-header-row';
    let curMonth = '', monthStart = 0;
    for (let i = 0; i <= totalDays; i++) {
      const dt = new Date(minDate.getTime() + i * dayMs);
      const mo = i < totalDays ? dt.toLocaleDateString('en-GB', { month: 'short', year: 'numeric' }) : curMonth;
      if (mo !== curMonth) {
        if (curMonth && i > monthStart) { const cell = document.createElement('div'); cell.className = 'gantt-header-cell'; cell.style.width = ((i - monthStart) * dayWidth) + 'px'; cell.textContent = curMonth; monthRow.appendChild(cell); }
        curMonth = mo; monthStart = i;
      }
    }
    if (curMonth && totalDays > monthStart) { const cell = document.createElement('div'); cell.className = 'gantt-header-cell'; cell.style.width = ((totalDays - monthStart) * dayWidth) + 'px'; cell.textContent = curMonth; monthRow.appendChild(cell); }
    const dayRow = document.createElement('div');
    dayRow.className = 'gantt-header-row';
    for (let i = 0; i < totalDays; i++) { const dt = new Date(minDate.getTime() + i * dayMs); const cell = document.createElement('div'); cell.className = 'gantt-header-cell'; cell.style.width = dayWidth + 'px'; cell.textContent = String(dt.getDate()); dayRow.appendChild(cell); }
    headerWrap.appendChild(monthRow);
    headerWrap.appendChild(dayRow);
  } else if (ganttScale === 'week') {
    let curKey = '', curLabel = '', cellStart = 0;
    for (let i = 0; i <= totalDays; i++) {
      const dt = new Date(minDate.getTime() + i * dayMs); const w = isoWeekInfo(dt); const key = w.year + '-' + w.week; const label = 'W' + w.week;
      if (key !== curKey) { if (curKey && i > cellStart) { const cell = document.createElement('div'); cell.className = 'gantt-header-cell'; cell.style.width = ((i - cellStart) * dayWidth) + 'px'; cell.textContent = curLabel; header.appendChild(cell); } curKey = key; curLabel = label; cellStart = i; }
    }
    if (totalDays > cellStart) { const cell = document.createElement('div'); cell.className = 'gantt-header-cell'; cell.style.width = ((totalDays - cellStart) * dayWidth) + 'px'; cell.textContent = curLabel; header.appendChild(cell); }
  } else {
    let curMonth = '', monthStart = 0;
    for (let i = 0; i <= totalDays; i++) {
      const dt = new Date(minDate.getTime() + i * dayMs); const mo = dt.toLocaleDateString('en-GB', { month: 'short', year: 'numeric' });
      if (mo !== curMonth) { if (curMonth && i > monthStart) { const cell = document.createElement('div'); cell.className = 'gantt-header-cell'; cell.style.width = ((i - monthStart) * dayWidth) + 'px'; cell.textContent = curMonth; header.appendChild(cell); } curMonth = mo; monthStart = i; }
    }
    if (totalDays > monthStart) { const cell = document.createElement('div'); cell.className = 'gantt-header-cell'; cell.style.width = ((totalDays - monthStart) * dayWidth) + 'px'; cell.textContent = curMonth; header.appendChild(cell); }
  }

  if (headerWrap) inner.appendChild(headerWrap);
  else inner.appendChild(header);

  function renderEquipBars(gridRow, tasks) {
    tasks.forEach(t => {
      const startOff = Math.max(0, (t.start - minDate) / dayMs);
      const dur = Math.max(1, (t.end - t.start) / dayMs);
      const bar = document.createElement('div');
      bar.className = 'gantt-bar';
      bar.style.left = (startOff * dayWidth) + 'px';
      bar.style.width = (dur * dayWidth) + 'px';
      bar.style.background = calibColorMap[t.calibStatus] || COLORS[0];
      if (t.calibStatus === 'critical' || t.calibStatus === 'expired') bar.style.animation = 'calibFlash 2s infinite';
      bar.textContent = t.install || t.client;
      const calibEndStr = t.calibEnd ? t.calibEnd.toLocaleDateString('en-GB') : 'N/A';
      bar.title = 'Calib expires: ' + calibEndStr + ' (' + calibLabel(t.calibStatus) + ')\n' + t.client + ' — ' + t.install + '\n' + t.start.toLocaleDateString('en-GB') + ' → ' + t.end.toLocaleDateString('en-GB');
      bar.setAttribute('role', 'img');
      gridRow.appendChild(bar);
    });
  }

  if (useHierarchy) {
    // Hierarchy mode: Client → Installation → Equipment
    hierarchyRows.forEach(spec => {
      const nameRow = document.createElement('div');
      const gridRow = document.createElement('div');
      gridRow.className = 'gantt-row';

      if (spec.kind === 'tech') {
        nameRow.className = 'gantt-name-row gantt-h-tech';
        const hasChildren = hierarchyRows.some(r => r.kind !== 'tech' && r.ti === spec.ti);
        if (hasChildren) {
          const toggle = document.createElement('span');
          toggle.className = 'gantt-toggle';
          toggle.textContent = '▼';
          toggle.setAttribute('role', 'button');
          toggle.dataset.ganttTechToggle = String(spec.ti);
          toggle.addEventListener('click', e => { e.stopPropagation(); expandedTech[spec.ti] = !expandedTech[spec.ti]; applyEqHierarchyVisibility(); });
          nameRow.appendChild(toggle);
        } else {
          nameRow.appendChild(document.createElement('span')).className = 'gantt-toggle-spacer';
        }
        const lab = document.createElement('span');
        lab.className = 'gantt-name-label';
        lab.textContent = spec.techName;
        lab.title = spec.techName;
        nameRow.appendChild(lab);
        renderEquipBars(gridRow, spec.tasks);
      } else if (spec.kind === 'project') {
        nameRow.className = 'gantt-name-row gantt-h-project';
        nameRow.dataset.ganttT = String(spec.ti);
        gridRow.dataset.ganttT = String(spec.ti);
        const toggle = document.createElement('span');
        toggle.className = 'gantt-toggle';
        toggle.textContent = '▼';
        toggle.setAttribute('role', 'button');
        toggle.dataset.ganttProjToggle = spec.projKey;
        toggle.addEventListener('click', e => { e.stopPropagation(); expandedProj[spec.projKey] = !expandedProj[spec.projKey]; applyEqHierarchyVisibility(); });
        nameRow.appendChild(toggle);
        const lab = document.createElement('span');
        lab.className = 'gantt-name-label';
        lab.textContent = spec.client;
        lab.title = spec.techName + ' — ' + spec.client;
        nameRow.appendChild(lab);
        renderEquipBars(gridRow, spec.tasks);
      } else {
        nameRow.className = 'gantt-name-row gantt-h-scope';
        nameRow.dataset.ganttT = String(spec.ti);
        nameRow.dataset.ganttProj = spec.projKey;
        gridRow.dataset.ganttT = String(spec.ti);
        gridRow.dataset.ganttProj = spec.projKey;
        nameRow.appendChild(document.createElement('span')).className = 'gantt-toggle-spacer';
        const lab = document.createElement('span');
        lab.className = 'gantt-name-label';
        lab.textContent = spec.scope;
        lab.title = spec.scope;
        const worstCalib = spec.tasks.reduce((worst, t) => { const order = { expired: 0, critical: 1, warning: 2, ok: 3, unknown: 4 }; return order[t.calibStatus] < order[worst] ? t.calibStatus : worst; }, 'unknown');
        if (worstCalib === 'expired' || worstCalib === 'critical') nameRow.style.color = 'var(--danger)';
        nameRow.appendChild(lab);
        renderEquipBars(gridRow, spec.tasks);
      }

      names.appendChild(nameRow);
      inner.appendChild(gridRow);
    });
    applyEqHierarchyVisibility();
  } else {
    // Flat mode: simple equipment list
    equipNames.forEach(name => {
      const row = document.createElement('div');
      row.className = 'gantt-name-row';
      const tasks = equipMap[name];
      const worstCalib = tasks.reduce((worst, t) => { const order = { expired: 0, critical: 1, warning: 2, ok: 3, unknown: 4 }; return order[t.calibStatus] < order[worst] ? t.calibStatus : worst; }, 'unknown');
      row.style.fontSize = '10.5px';
      if (worstCalib === 'expired' || worstCalib === 'critical') row.style.color = 'var(--danger)';
      row.textContent = name.length > 30 ? name.substring(0, 28) + '…' : name;
      row.title = name;
      names.appendChild(row);

      const gridRow = document.createElement('div');
      gridRow.className = 'gantt-row';
      renderEquipBars(gridRow, tasks);
      inner.appendChild(gridRow);
    });
  }

  const today = new Date();
  if (today >= minDate && today <= maxDate) {
    const todayOff = (today - minDate) / dayMs;
    const todayLine = document.createElement('div');
    todayLine.className = 'gantt-today';
    todayLine.style.left = (todayOff * dayWidth) + 'px';
    inner.appendChild(todayLine);
    requestAnimationFrame(() => {
      const hh = headerWrap ? headerWrap.offsetHeight : header.offsetHeight;
      todayLine.style.top = hh + 'px';
      todayLine.style.height = (dataRowCount * rowH) + 'px';
    });
  }
  gc.appendChild(names);
  grid.appendChild(inner);
  gc.appendChild(grid);
  wrap.appendChild(gc);
  names.addEventListener('scroll', () => { grid.scrollTop = names.scrollTop; });
  grid.addEventListener('scroll', () => { names.scrollTop = grid.scrollTop; });

  // Align name header height with grid header
  requestAnimationFrame(() => {
    const hh = (headerWrap ? headerWrap.offsetHeight : header.offsetHeight) || rowH;
    nh.style.height = hh + 'px';
    nh.style.minHeight = hh + 'px';
  });

  const legend = document.createElement('div');
  legend.className = 'gantt-legend';
  [['Calibrated (>3mo)', '#7AB800'], ['Next to calibrate (1-3mo)', '#eab308'], ['Next to calibrate (this month)', '#E98300'], ['Calibration expired', '#C82882']].forEach(([label, color]) => {
    const item = document.createElement('div');
    item.className = 'gantt-legend-item';
    item.innerHTML = '<div class="gantt-legend-dot" style="background:' + color + '"></div>' + esc(label);
    legend.appendChild(item);
  });
  wrap.appendChild(legend);
  container.appendChild(wrap);
}

function renderEquipmentSummaryTable(data) {
  const container = document.getElementById('equipment-summary-view');
  if (!container) return;

  // Group by equipment (must match the Gantt equipment rows):
  // In the Gantt we display:
  // - `${Equipment Name} (${Equipment ID})` when IDs exist and differ
  // - else just `${Equipment Name}`.
  // We use the exact same display key here to avoid merging distinct rows.
  const groups = {};
  const statusOrder = { 'Out of Service': 3, 'In Calibration': 2, 'Standby': 1, 'In Service': 0 };
  function normEquipStatus(s) { return (s || '').toString().trim(); }
  function getEquipStatusColor(s) {
    const st = normEquipStatus(s);
    if (st === 'In Service') return 'var(--success)';
    if (st === 'In Calibration') return 'var(--warning)';
    if (st === 'Standby') return 'var(--info)';
    if (st === 'Out of Service') return 'var(--danger)';
    return 'var(--text-2)';
  }

  data.forEach(r => {
    const desc = (r['Equipment Name'] || '').toString().trim();
    const id = (r['Equipment ID'] || '').toString().trim();
    const displayKey = id && id !== desc ? (desc + ' (' + id + ')') : desc;
    const key = displayKey;
    if (!key) return;

    const st = normEquipStatus(r['Status']);
    const calibEndDate = excelDate(r['Calibration End Date']);
    const calibStatus = getCalibStatus(r['Calibration End Date']);
    const calibRank = { ok: 0, warning: 1, critical: 2, expired: 3, unknown: -1 };

    if (!groups[key]) {
      groups[key] = {
        key,
        description: displayKey,
        status: st,
        installation: (r['Installation'] || '').toString().trim(),
        client: (r['Client'] || '').toString().trim(),
        calibStatus,
        calibRank: calibRank[calibStatus] ?? -1,
        calibEndDate: calibEndDate || null
      };
    } else {
      // Choose the worst calibration status across rows.
      const prevRank = groups[key].calibRank ?? -1;
      const nextRank = calibRank[calibStatus] ?? -1;
      if (nextRank > prevRank) {
        groups[key].calibStatus = calibStatus;
        groups[key].calibRank = nextRank;
        groups[key].calibEndDate = calibEndDate || null;
      }
      // Choose the worst equipment status too.
      const prevStRank = statusOrder[groups[key].status] ?? 0;
      const nextStRank = statusOrder[st] ?? 0;
      if (nextStRank > prevStRank) groups[key].status = st;
    }
  });

  const rows = Object.values(groups).sort((a, b) => a.description.localeCompare(b.description));
  if (rows.length === 0) {
    container.innerHTML = '<div class="empty-desc">No equipment summary available for current filters.</div>';
    return;
  }

  container.innerHTML =
    '<div class="chart-card" style="padding:16px;margin-bottom:18px;background:var(--card-glass)">' +
    '<div class="chart-header" style="padding:0 0 12px 0">' +
    '<span class="chart-title">Equipment summary</span>' +
    '</div>' +
    '<table class="equip-table equip-summary-table">' +
    '<thead>' +
    '<tr>' +
    '<th>Description</th>' +
    '<th>Status</th>' +
    '<th>Installation</th>' +
    '<th>Client</th>' +
    '<th>Status of calibration</th>' +
    '<th>Calibration date</th>' +
    '</tr>' +
    '</thead>' +
    '<tbody></tbody>' +
    '</table>' +
    '</div>';

  const tbody = container.querySelector('tbody');
  rows.forEach(r => {
    const stColor = getEquipStatusColor(r.status);
    const cs = r.calibStatus;
    const calibBadge = '<span class="calib-badge ' + esc(cs) + '">' + esc(calibLabel(cs)) + '</span>';
    const calibDateStr = r.calibEndDate ? r.calibEndDate.toLocaleDateString('en-GB') : 'N/A';
    const tr = document.createElement('tr');
    tr.innerHTML =
      '<td>' + esc(r.description) + '</td>' +
      '<td><span class="equip-status-badge" style="background:' + stColor + '2A;color:' + stColor + ';border:1px solid rgba(0,0,0,0.08)">' + esc(r.status || '-') + '</span></td>' +
      '<td>' + esc(r.installation || '-') + '</td>' +
      '<td>' + esc(r.client || '-') + '</td>' +
      '<td>' + calibBadge + '</td>' +
      '<td style="font-family:var(--font-mono);font-size:11px">' + esc(calibDateStr) + '</td>';
    tbody.appendChild(tr);
  });
}

let tableAlertFilter = '';
function renderEquipmentTable(data) {
  const container = document.getElementById('equipment-table-view');
  container.innerHTML = '';
  // Filter bar inside table view
  const filterBar = document.createElement('div');
  filterBar.className = 'filters-bar';
  filterBar.style.marginBottom = '12px';
  filterBar.innerHTML =
    '<div class="filter-group"><label>Alert Level</label>' +
    '<select class="filter-input" id="tbl-alert-filter" onchange="tableAlertFilter=this.value;renderEquipmentTable(state.equipment.filtered)">' +
    '<option value=""' + (tableAlertFilter === '' ? ' selected' : '') + '>All</option>' +
    '<option value="expired"' + (tableAlertFilter === 'expired' ? ' selected' : '') + '>Expired</option>' +
    '<option value="critical"' + (tableAlertFilter === 'critical' ? ' selected' : '') + '>This Month</option>' +
    '<option value="warning"' + (tableAlertFilter === 'warning' ? ' selected' : '') + '>Soon</option>' +
    '<option value="ok"' + (tableAlertFilter === 'ok' ? ' selected' : '') + '>Valid</option>' +
    '</select></div>' +
    '<span class="filter-count" id="tbl-count"></span>';
  container.appendChild(filterBar);
  // Apply table-level alert filter
  let filtered = data;
  if (tableAlertFilter) filtered = data.filter(r => getCalibStatus(r['Calibration End Date']) === tableAlertFilter);
  const tbl = document.createElement('table');
  tbl.className = 'equip-table';
  tbl.innerHTML = '<thead><tr><th>Equipment</th><th>Work Order</th><th>Scope</th><th>Installation</th><th>Client</th><th>Status</th><th>Calib. Expires</th><th>Days Left</th><th>Alert</th></tr></thead>';
  const tbody = document.createElement('tbody');
  const sorted = [...filtered].sort((a, b) => {
    const da = excelDate(a['Calibration End Date']), db = excelDate(b['Calibration End Date']);
    if (!da) return 1; if (!db) return -1;
    return da - db;
  });
  const now = new Date();
  sorted.forEach(r => {
    const calibEnd = excelDate(r['Calibration End Date']);
    const cs = getCalibStatus(r['Calibration End Date']);
    const daysLeft = calibEnd ? Math.round((calibEnd - now) / 864e5) : null;
    const tr = document.createElement('tr');
    if (cs === 'expired') tr.className = 'row-critical';
    else if (cs === 'warning' || cs === 'critical') tr.className = 'row-warning';
    tr.innerHTML =
      '<td>' + esc(r['Equipment Name']) + '</td>' +
      '<td style="font-family:var(--font-mono);font-size:11px">' + esc(r['Work Order'] || r['Equipment ID'] || '') + '</td>' +
      '<td style="font-size:11px">' + esc((r['Scope'] || r['Category'] || '').toString().substring(0, 40)) + '</td>' +

      '<td><span class="calib-badge ' + cs + '">' + calibLabel(cs) + '</span></td>';

function renderEquipmentCharts(d) {
  const calibGroups = { ok: 0, warning: 0, critical: 0, expired: 0 };
  d.forEach(r => { const s = getCalibStatus(r['Calibration End Date']); if (calibGroups[s] !== undefined) calibGroups[s]++; });
  const calibLabels = ['Calibrated (>3mo)', 'Next to calibrate (1-3mo)', 'Next to calibrate (this month)', 'Calibration expired'];
  const calibValues = [calibGroups.ok, calibGroups.warning, calibGroups.critical, calibGroups.expired];
  const calibColors = ['#7AB800', '#eab308', '#E98300', '#C82882'];
  const calibOpts = {
    chart: { type: 'donut', height: 280 },
    series: calibValues, labels: calibLabels, colors: calibColors,
    plotOptions: { pie: { donut: { size: '72%', labels: { show: true, name: { fontSize: '13px', fontWeight: 600 }, value: { fontSize: '22px', fontWeight: 700, formatter: v => fmt(+v) }, total: { show: true, label: 'Total', formatter: w => fmt(w.globals.seriesTotals.reduce((a, b) => a + b, 0)) } } } } },

    legend: { show: false }, grid: { xaxis: { lines: { show: true } }, yaxis: { lines: { show: false } } }
  };
  // Use Category if available, otherwise fall back to Scope for grouping

  const catg = groupBy(d, catField);
  const cate = Object.entries(catg).map(([k, v]) => [k.length > 30 ? k.substring(0, 28) + '…' : k, v.length]).sort((a, b) => b[1] - a[1]).slice(0, 10);
  const catOpts = {
    chart: { type: 'bar', height: 280 },
    series: [{ name: 'Equipment', data: cate.map(e => e[1]) }],
    colors: [COLORS[4]],
    plotOptions: { bar: { borderRadius: 5, columnWidth: '55%' } },
    dataLabels: { enabled: false },
    xaxis: { categories: cate.map(e => e[0]), labels: { style: { fontSize: '10px' }, rotate: -45, rotateAlways: cate.length > 4 } },
    yaxis: { labels: { formatter: v => fmt(v) } }, legend: { show: false }
  };
  const clg = groupBy(d, 'Client');
  const cle = Object.entries(clg).map(([k, v]) => [k, v.length]).sort((a, b) => b[1] - a[1]);
  const clientOpts = {
    chart: { type: 'bar', height: 280 },
    series: [{ data: cle.map(e => e[1]) }],

    legend: { show: false }, grid: { xaxis: { lines: { show: true } }, yaxis: { lines: { show: false } } }
  };
  // Calibration expiry timeline
  const byMonth = {};
  d.forEach(r => {

    if (ce) { const k = ce.getFullYear() + '-' + String(ce.getMonth() + 1).padStart(2, '0'); byMonth[k] = (byMonth[k] || 0) + 1; }
  });
  const tm = Object.keys(byMonth).sort();
  const now = new Date();
  const nowKey = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
  const timeColors = tm.map(k => k <= nowKey ? '#ef4444' : '#2a9d8f');

    dataLabels: { enabled: false }, legend: { show: false }

  buildChartGrid('charts-equipment', [

    { id: 'c-e-status', title: 'Equipment Status', options: statusOpts },
    { id: 'c-e-install', title: 'Equipment by Installation', tag: 'top 12', options: installOpts },
    { id: 'c-e-cat', title: 'Equipment by ' + (catField === 'Category' ? 'Category' : 'Scope'), options: catOpts },
    { id: 'c-e-client', title: 'Equipment by Client', options: clientOpts },
    { id: 'c-e-expiry', title: 'Calibration Expiry Timeline', tag: 'by month', options: expiryOpts, wide: true }

}

function renderMaster() {
  const d = state.master.filtered;

  if (leadsSortCol === col) leadsSortAsc = !leadsSortAsc;
  else { leadsSortCol = col; leadsSortAsc = true; }
  leadsPage = 1;
  renderLeadsTable(state.leads.filtered);
}
function leadsPageNav(action, totalPages) {
  leadsLastPageAction = action;
  if (action === 'first') leadsPage = 1;
  else if (action === 'prev') leadsPage = Math.max(1, leadsPage - 1);
  else if (action === 'next') leadsPage = Math.min(totalPages, leadsPage + 1);
  else if (action === 'last') leadsPage = totalPages;
  renderLeadsTable(state.leads.filtered);
}

  }

  const chartDefs = [
    { id: 'c-l-status', title: 'Leads by Status', tag: 'count', options: statusOpts },
    { id: 'c-l-service', title: 'Leads by Service', tag: '% share', options: svcOpts },
    { id: 'c-l-segment', title: 'Leads by Segment', tag: '% share', options: segOpts },
    { id: 'c-l-entities', title: 'Top Entities', tag: 'by lead count', options: entOpts },
    { id: 'c-l-timeline', title: 'Leads Timeline', tag: 'by Created date', options: timelineOpts, wide: true }
  ];
  if (respChartDef) chartDefs.splice(3, 0, respChartDef);
  buildChartGrid('charts-leads', chartDefs);

  leadsPage = 1;
  renderLeadsTable(d);
}

function renderLeadsTable(data) {
  const container = document.getElementById('leads-table-view');
  const totalPages = Math.max(1, Math.ceil(data.length / LEADS_PER_PAGE));
  if (leadsPage > totalPages) leadsPage = totalPages;

  // Sort data
  const sorted = [...data].sort((a, b) => {
    const col = LEADS_COLUMNS.find(c => c.key === leadsSortCol);
    let va, vb;
    if (col && col.isDate) {
      va = excelDate(a[leadsSortCol]) || parseDate(a[leadsSortCol]) || new Date(0);
      vb = excelDate(b[leadsSortCol]) || parseDate(b[leadsSortCol]) || new Date(0);
      return leadsSortAsc ? va - vb : vb - va;
    }
    va = (a[leadsSortCol] || '').toString().toLowerCase();
    vb = (b[leadsSortCol] || '').toString().toLowerCase();
    if (va < vb) return leadsSortAsc ? -1 : 1;
    if (va > vb) return leadsSortAsc ? 1 : -1;
    return 0;
  });

  const start = (leadsPage - 1) * LEADS_PER_PAGE;
  const pageData = sorted.slice(start, start + LEADS_PER_PAGE);

  const fmtDate = v => { const d = excelDate(v) || parseDate(v); return d ? d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) : ''; };
  const esc = v => (v || '').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const statusBadge = s => {
    const st = (s || '').toString().trim();
    if (!st) return '<span style="color:var(--text-3);font-style:italic" aria-label="No status">&#8212; No status</span>';
    const lower = st.toLowerCase();
    let bg = 'var(--bg-2)', col = 'var(--text)', icon = '';
    if (lower === 'in progress') { bg = 'rgba(233,131,0,0.12)'; col = 'var(--warm)'; icon = '&#9679; '; }
    else if (lower.includes('complet') || lower.includes('won')) { bg = 'rgba(122,184,0,0.12)'; col = 'var(--success)'; icon = '&#10003; '; }
    else if (lower.includes('lost') || lower.includes('reject')) { bg = 'rgba(239,68,68,0.12)'; col = 'var(--danger)'; icon = '&#10007; '; }
    return '<span style="display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;background:' + bg + ';color:' + col + '">' + icon + esc(st) + '</span>';
  };

  // Pagination bar
  const showing = data.length > 0 ? 'Showing ' + (start + 1) + '&#8211;' + Math.min(start + LEADS_PER_PAGE, data.length) + ' of ' + data.length + ' leads' : 'No leads';
  let html = '<nav aria-label="Leads table pagination" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px">' +
    '<span style="font-size:12px;color:var(--text-3)">' + showing + '</span>' +
    '<div style="display:flex;gap:4px;align-items:center">' +
    '<button class="page-btn" data-page-action="first" aria-label="First page" onclick="leadsPageNav(\'first\',' + totalPages + ')" ' + (leadsPage <= 1 ? 'disabled' : '') + '>&laquo;</button>' +
    '<button class="page-btn" data-page-action="prev" aria-label="Previous page" onclick="leadsPageNav(\'prev\',' + totalPages + ')" ' + (leadsPage <= 1 ? 'disabled' : '') + '>&lsaquo;</button>' +
    '<span style="font-size:12px;font-weight:600;padding:0 8px;color:var(--text-2)" aria-live="polite">Page ' + leadsPage + ' / ' + totalPages + '</span>' +
    '<button class="page-btn" data-page-action="next" aria-label="Next page" onclick="leadsPageNav(\'next\',' + totalPages + ')" ' + (leadsPage >= totalPages ? 'disabled' : '') + '>&rsaquo;</button>' +
    '<button class="page-btn" data-page-action="last" aria-label="Last page" onclick="leadsPageNav(\'last\',' + totalPages + ')" ' + (leadsPage >= totalPages ? 'disabled' : '') + '>&raquo;</button>' +
    '</div></nav>';

  // Table
  html += '<div style="overflow-x:auto;border-radius:var(--r);border:1px solid var(--glass-border);box-shadow:var(--sh)">';
  html += '<table class="equip-table" style="min-width:900px"><thead><tr>';
  LEADS_COLUMNS.forEach(col => {
    const isActive = leadsSortCol === col.key;
    const arrow = isActive ? (leadsSortAsc ? '&#9650;' : '&#9660;') : '&#9650;';
    html += '<th class="sortable' + (isActive ? ' sort-active' : '') + '" onclick="leadsSort(\'' + col.key + '\')" aria-sort="' + (isActive ? (leadsSortAsc ? 'ascending' : 'descending') : 'none') + '" role="columnheader" tabindex="0" onkeydown="if(event.key===\'Enter\')leadsSort(\'' + col.key + '\')">' + col.label + '<span class="sort-arrow">' + arrow + '</span></th>';
  });
  html += '</tr></thead><tbody>';

  if (pageData.length === 0) {
    html += '<tr><td colspan="11"><div class="empty-state" style="padding:40px 20px">' +
      '<div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>' +
      '<div class="empty-title">No leads match current filters</div>' +
      '<div class="empty-desc">Try adjusting or clearing your filter criteria to see results.</div>' +
      '</div></td></tr>';
  } else {
    pageData.forEach(r => {
      html += '<tr>';
      html += '<td style="white-space:nowrap;font-family:var(--font-mono);font-size:11px">' + fmtDate(r['Created']) + '</td>';
      html += '<td style="max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + esc(r['Title']) + '">' + esc(r['Title']) + '</td>';
      html += '<td>' + esc(r['Responsible']) + '</td>';
      html += '<td style="font-size:11px">' + esc(r['Entity']) + '</td>';
      html += '<td>' + statusBadge(r['Status']) + '</td>';
      html += '<td style="white-space:nowrap;font-family:var(--font-mono);font-size:11px">' + fmtDate(r['DueDate']) + '</td>';
      html += '<td>' + esc(r['Installation']) + '</td>';
      html += '<td>' + esc(r['Customer']) + '</td>';
      html += '<td>' + esc(r['Head Customer']) + '</td>';
      html += '<td>' + esc(r['Segment']) + '</td>';
      html += '<td>' + esc(r['Service']) + '</td>';
      html += '</tr>';
    });
  }
  html += '</tbody></table></div>';
  container.innerHTML = html;

  // Restore focus after pagination re-render
  if (leadsLastPageAction) {
    const target = container.querySelector('[data-page-action="' + leadsLastPageAction + '"]');
    if (target && !target.disabled) target.focus();
    leadsLastPageAction = '';
  }
}

// ─── Export charts as PNG ───
function exportCharts() {
  // Equipment tab: if in gantt/table view, temporarily render charts to export
  if (activeTab === 'equipment' && equipmentView !== 'charts') {
    const d = state.equipment.filtered;
    const prevView = equipmentView;
    // Temporarily show charts container to render them
    const chartsContainer = document.getElementById('charts-equipment');
    chartsContainer.style.display = '';
    renderEquipmentCharts(d);
    // Wait for charts to render, then export and restore view
    setTimeout(() => {
      const eqCharts = Object.entries(charts).filter(([id]) => id.startsWith('c-e'));
      if (eqCharts.length === 0) { toast('No charts to export', 'info'); setEquipmentView(prevView); return; }
      let pending = eqCharts.length;
      eqCharts.forEach(([id, chart]) => {
        if (chart && chart.dataURI) {
          chart.dataURI().then(({ imgURI }) => {
            const a = document.createElement('a');
            a.href = imgURI;
            a.download = id + '.png';
            a.click();
          }).finally(() => { if (--pending === 0) setEquipmentView(prevView); });
        } else { if (--pending === 0) setEquipmentView(prevView); }
      });
      toast('Exporting ' + eqCharts.length + ' charts...', 'info');
    }, 300);
    return;
  }

  const activeCharts = Object.entries(charts).filter(([id]) => id.startsWith('c-' + activeTab.charAt(0)));
  if (activeCharts.length === 0) { toast('No charts to export', 'info'); return; }
  activeCharts.forEach(([id, chart]) => {
    if (chart && chart.dataURI) {
      chart.dataURI().then(({ imgURI }) => {
        const a = document.createElement('a');
        a.href = imgURI;
        a.download = id + '.png';
        a.click();
      });
    }
  });
  toast('Exporting ' + activeCharts.length + ' charts...', 'info');
}
